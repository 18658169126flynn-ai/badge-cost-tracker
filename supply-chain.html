function renderChainOverview() {
    document.getElementById('chainOverview').innerHTML = chainLayers.map((l, i) => `
        <div class="chain-layer" style="border-top: 3px solid ${l.color}">
            ${i < 4 ? '<span class="chain-arrow">→</span>' : ''}
            <div class="layer-icon">${l.icon}</div>
            <div class="layer-name">${l.name}</div>
            <div class="layer-desc">${l.desc}</div>
            <div class="layer-market">${l.market}</div>
            <div style="font-size:9px;color:#475569;margin-top:4px;line-height:1.4">${l.players}</div>
        </div>
    `).join('');
}

function renderMetrics() {
    document.getElementById('metricsGrid').innerHTML = keyMetrics.map(m => `
        <div class="metric-card">
            <div class="metric-icon">${m.icon}</div>
            <div class="metric-info">
                <div class="metric-label">${m.label}</div>
                <div class="metric-value">${m.value}</div>
                <div class="metric-change ${m.up ? 'up' : 'down'}">${m.change}</div>
            </div>
        </div>
    `).join('');
}

function renderAlertBar() {
    const bar = document.getElementById('alertBar');
    const criticalRisks = risks.filter(r => r.level === 'critical');
    const warningRisks = risks.filter(r => r.level === 'warning');
    bar.innerHTML = `<span class="label">🚨 产业链预警</span>` +
        criticalRisks.map(r => `<span class="alert-tag critical">🔴 ${r.product}: ${r.type}</span>`).join('') +
        warningRisks.map(r => `<span class="alert-tag warning">🟡 ${r.product}: ${r.type}</span>`).join('');
}

function renderPrices() {
    // US Stocks
    const usGrid = document.getElementById('usStocksGrid');
    usGrid.innerHTML = usStocks.map(s => {
        const isUp = s.change >= 0;
        return `<div class="price-card">
            <div class="name">${s.name}</div>
            <div class="ticker">${s.ticker}</div>
            <div class="value ${isUp?'up':'down'}">${s.price.toLocaleString()}</div>
            <div class="change ${isUp?'up':'down'}">${isUp?'▲':'▼'} ${Math.abs(s.change)}%</div>
        </div>`;
    }).join('');
    // Commodities
    const comGrid = document.getElementById('commoditiesGrid');
    comGrid.innerHTML = commodities.map(c => {
        const isUp = c.change >= 0;
        return `<div class="price-card">
            <div class="name">${c.name}</div>
            <div class="ticker">${c.symbol}</div>
            <div class="value ${isUp?'up':'down'}">${c.price.toLocaleString()}</div>
            <div class="change ${isUp?'up':'down'}">${isUp?'▲':'▼'} ${Math.abs(c.change)}%</div>
            <div class="unit">${c.unit}</div>
        </div>`;
    }).join('');
}

function renderNews() {
    const list = document.getElementById('newsList');
    const tagMap = {
        'GPU':'tag-gpu','HBM':'tag-hbm','封装':'tag-packaging','服务器':'tag-server',
        '液冷':'tag-cooling','光模块':'tag-optical','国产算力':'tag-domestic',
        '政策':'tag-policy','材料':'tag-material'
    };
    list.innerHTML = news.map(n => {
        const tagClass = tagMap[n.category]||'tag-gpu';
        const impactClass = n.impact==='critical'?'impact-critical':n.impact==='high'?'impact-high':'impact-medium';
        return `<div class="news-item">
            <div class="title">${n.title}</div>
            <div class="meta">
                <span class="tag ${tagClass}">${n.category}</span>
                <span class="impact ${impactClass}">${n.impact==='critical'?'🔴极高':'🟡高'}</span>
                <span>📰 ${n.source}</span>
                <span>🕐 ${n.time}</span>
            </div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;line-height:1.5">${n.summary}</div>
            <div style="font-size:10px;color:#3a4060;margin-top:3px">影响: ${n.products}</div>
        </div>`;
    }).join('');
}

function renderRisks() {
    // Alert bar
    renderAlertBar();
    // Risk grid
    const grid = document.getElementById('riskGrid');
    grid.innerHTML = risks.map(r => {
        const cls = r.level==='critical'?'critical':r.level==='warning'?'warning':'info';
        const icon = r.level==='critical'?'🔴':r.level==='warning'?'🟡':'🔵';
        return `<div class="risk-card ${cls}">
            <div class="product">${icon} ${r.product}</div>
            <div class="risk-type">${r.type}</div>
            <div class="desc">${r.desc}</div>
        </div>`;
    }).join('');
}

async function renderWorldMap() {
    const mapChart = echarts.init(document.getElementById('worldMap'));
    try {
        const geoRes = await fetch('world.geo.json');
        const geoJson = await geoRes.json();
        echarts.registerMap('world', geoJson);
    } catch(e) {
        console.error('地图数据加载失败:', e);
        return;
    }
    mapChart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(10,14,26,0.95)',
            borderColor: 'rgba(99,102,241,0.4)',
            textStyle: { color: '#e0e6ed', fontSize: 11 },
            formatter: function(params) {
                if (params.data && params.data.desc) {
                    const icon = params.data.impact === 'critical' ? '🔴' : params.data.impact === 'high' ? '🟡' : '🔵';
                    return `<b>${icon} ${params.data.name}</b><br/>${params.data.desc.replace(/\n/g, '<br/>')}`;
                }
                return '';
            }
        },
        geo: {
            map: 'world', roam: false, zoom: 1.15, center: [20, 30],
            itemStyle: { areaColor: 'rgba(15,22,40,0.6)', borderColor: 'rgba(99,102,241,0.15)', borderWidth: 0.5 },
            emphasis: { itemStyle: { areaColor: 'rgba(99,102,241,0.1)' }, label: { show: false } },
            label: { show: false },
        },
        series: [{
            type: 'effectScatter',
            coordinateSystem: 'geo',
            data: worldEvents.map(e => ({
                name: e.name, value: [...e.coord, 1], desc: e.desc, impact: e.impact,
                symbolSize: e.impact === 'critical' ? 16 : e.impact === 'high' ? 12 : 8,
                itemStyle: {
                    color: e.impact === 'critical' ? '#f87171' : e.impact === 'high' ? '#fbbf24' : '#60a5fa',
                    shadowBlur: 15,
                    shadowColor: e.impact === 'critical' ? 'rgba(239,68,68,0.6)' : 'rgba(251,191,36,0.4)'
                }
            })),
            rippleEffect: { brushType: 'stroke', scale: 3, period: 4 },
            label: {
                show: true, position: 'right', formatter: '{b}',
                color: '#94a3b8', fontSize: 9,
                textBorderColor: 'rgba(10,14,26,0.8)', textBorderWidth: 2
            }
        }]
    });
    window.addEventListener('resize', () => mapChart.resize());
}
