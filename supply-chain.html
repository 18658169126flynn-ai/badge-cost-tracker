// ========== RENDER ==========
function renderChainOverview(){
    document.getElementById('chainOverview').innerHTML=chainLayers.map((l,i)=>`
        <div class="chain-layer" style="border-top:3px solid ${l.color}">
            ${i<4?'<span class="chain-arrow">→</span>':''}
            <div class="layer-icon">${l.icon}</div>
            <div class="layer-name">${l.name}</div>
            <div class="layer-desc">${l.desc}</div>
            <div class="layer-market">${l.market}</div>
            <div style="font-size:9px;color:#475569;margin-top:4px;line-height:1.4">${l.players}</div>
        </div>`).join('');
}

function renderMetrics(){
    document.getElementById('metricsGrid').innerHTML=keyMetrics.map(m=>`
        <div class="metric-card">
            <div class="metric-icon">${m.icon}</div>
            <div class="metric-info">
                <div class="metric-label">${m.label}</div>
                <div class="metric-value">${m.value}</div>
                <div class="metric-change ${m.up?'up':'down'}">${m.change}</div>
            </div>
        </div>`).join('');
}

function renderPrices(){
    document.getElementById('usStocksGrid').innerHTML=usStocks.map(s=>{
        const u=s.change>=0;
        return`<div class="price-card"><div class="name">${s.name}</div><div class="ticker">${s.ticker}</div><div class="value ${u?'up':'down'}">${s.price.toLocaleString()}</div><div class="change ${u?'up':'down'}">${u?'▲':'▼'} ${Math.abs(s.change)}%</div></div>`;
    }).join('');
    document.getElementById('commoditiesGrid').innerHTML=commodities.map(c=>{
        const u=c.change>=0;
        return`<div class="price-card"><div class="name">${c.name}</div><div class="ticker">${c.symbol}</div><div class="value ${u?'up':'down'}">${c.price.toLocaleString()}</div><div class="change ${u?'up':'down'}">${u?'▲':'▼'} ${Math.abs(c.change)}%</div><div class="unit">${c.unit}</div></div>`;
    }).join('');
}

function renderNews(){
    const tagMap={GPU:'tag-gpu',HBM:'tag-hbm',封装:'tag-packaging',服务器:'tag-server',液冷:'tag-cooling',光模块:'tag-optical',国产算力:'tag-domestic',政策:'tag-policy',材料:'tag-material'};
    document.getElementById('newsList').innerHTML=news.map(n=>{
        const tc=tagMap[n.category]||'tag-gpu';
        const ic=n.impact==='critical'?'impact-critical':n.impact==='high'?'impact-high':'impact-medium';
        return`<div class="news-item"><div class="title">${n.title}</div><div class="meta"><span class="tag ${tc}">${n.category}</span><span class="impact ${ic}">${n.impact==='critical'?'🔴极高':'🟡高'}</span><span>📰 ${n.source}</span><span>🕐 ${n.time}</span></div><div style="font-size:11px;color:#64748b;margin-top:4px;line-height:1.5">${n.summary}</div><div style="font-size:10px;color:#3a4060;margin-top:3px">影响: ${n.products}</div></div>`;
    }).join('');
}

function renderNodeMonitor(){
    document.getElementById('nodeMonitor').innerHTML=`<div style="max-height:480px;overflow-y:auto">`+nodeMonitor.map(n=>`
        <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px">
            <span style="font-size:16px;flex-shrink:0">${n.status}</span>
            <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700">${n.node} <span style="font-weight:400;color:#64748b;font-size:10px">${n.statusText}</span></div><div style="font-size:10px;color:#64748b;line-height:1.4;margin-top:2px">${n.detail}</div></div>
            <span style="font-size:10px;color:#818cf8;flex-shrink:0;padding:2px 6px;background:rgba(99,102,241,.1);border-radius:4px">${n.trend}</span>
        </div>`).join('')+'</div>';
}

function renderInvest(){
    const grid=document.getElementById('investGrid');
    grid.innerHTML=investSectors.map(s=>{
        const rows=s.stocks.map(st=>{
            const badge=st.signal==='bull'?'badge-bull':st.signal==='bear'?'badge-bear':'badge-warn';
            const sig=st.signal==='bull'?'🟢看多':st.signal==='bear'?'🔴看空':'🟡关注';
            return`<tr><td><strong>${st.name}</strong><br><span style="color:#475569;font-size:10px">${st.code}</span></td><td style="font-size:11px;color:#94a3b8">${st.logic}</td><td><span class="${badge}">${sig}</span></td><td style="font-size:11px;color:#64748b">${st.note}</td></tr>`;
        }).join('');
        return`<div class="invest-card" style="border-top:3px solid ${s.color}">
            <h3>${s.icon} ${s.name}</h3>
            <table><thead><tr><th>标的</th><th>逻辑</th><th>信号</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table>
            <div class="invest-note">⚠️ 风险提示：${s.risk}</div>
        </div>`;
    }).join('');
}

function renderCharts(){
    const changeChart=echarts.init(document.getElementById('changeChart'));
    const sorted=[...usStocks].sort((a,b)=>b.change-a.change);
    changeChart.setOption({
        tooltip:{trigger:'axis',backgroundColor:'rgba(15,22,40,.95)',borderColor:'rgba(99,102,241,.3)',textStyle:{color:'#e0e6ed',fontSize:11}},
        grid:{left:55,right:10,top:10,bottom:50},
        xAxis:{type:'category',data:sorted.map(s=>s.ticker),axisLabel:{color:'#64748b',fontSize:9,rotate:45},axisLine:{lineStyle:{color:'rgba(255,255,255,.06)'}}},
        yAxis:{type:'value',axisLabel:{color:'#64748b',fontSize:9,formatter:'{value}%'},splitLine:{lineStyle:{color:'rgba(255,255,255,.04)'}},axisLine:{show:false}},
        series:[{type:'bar',data:sorted.map(s=>({value:s.change,itemStyle:{color:s.change>=0?'#34d399':'#f87171',borderRadius:[3,3,0,0]}})),barWidth:18,label:{show:true,position:'top',formatter:'{c}%',color:'#64748b',fontSize:8}}]
    });
    const marketChart=echarts.init(document.getElementById('marketChart'));
    marketChart.setOption({
        tooltip:{trigger:'item',backgroundColor:'rgba(15,22,40,.95)',borderColor:'rgba(99,102,241,.3)',textStyle:{color:'#e0e6ed',fontSize:11},formatter:p=>`${p.name}<br/>市场规模: $${p.value}亿<br/>占比: ${p.percent}%`},
        series:[{type:'pie',radius:['35%','65%'],center:['50%','50%'],data:marketData.map(d=>({name:d.name,value:d.value,itemStyle:{color:d.color}})),label:{color:'#94a3b8',fontSize:9,formatter:'{b}\n${c}亿'},labelLine:{lineStyle:{color:'#334155'}},emphasis:{itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,.5)'}}}]
    });
    window.addEventListener('resize',()=>{changeChart.resize();marketChart.resize()});
}

async function renderWorldMap(){
    const mapChart=echarts.init(document.getElementById('worldMap'));
    try{const r=await fetch('world.geo.json');const j=await r.json();echarts.registerMap('world',j)}catch(e){console.error('地图加载失败:',e);return}
    mapChart.setOption({
        backgroundColor:'transparent',
        tooltip:{trigger:'item',backgroundColor:'rgba(10,14,26,.95)',borderColor:'rgba(99,102,241,.4)',textStyle:{color:'#e0e6ed',fontSize:11},formatter:function(p){if(p.data&&p.data.desc){const i=p.data.impact==='critical'?'🔴':p.data.impact==='high'?'🟡':'🔵';return`<b>${i} ${p.data.name}</b><br/>${p.data.desc.replace(/\n/g,'<br/')}`}return''}},
        geo:{map:'world',roam:false,zoom:1.15,center:[20,30],itemStyle:{areaColor:'rgba(15,22,40,.6)',borderColor:'rgba(99,102,241,.15)',borderWidth:.5},emphasis:{itemStyle:{areaColor:'rgba(99,102,241,.1)'},label:{show:false}},label:{show:false}},
        series:[{type:'effectScatter',coordinateSystem:'geo',data:worldEvents.map(e=>({name:e.name,value:[...e.coord,1],desc:e.desc,impact:e.impact,symbolSize:e.impact==='critical'?16:e.impact==='high'?12:8,itemStyle:{color:e.impact==='critical'?'#f87171':e.impact==='high'?'#fbbf24':'#60a5fa',shadowBlur:15,shadowColor:e.impact==='critical'?'rgba(239,68,68,.6)':'rgba(251,191,36,.4)'}})),rippleEffect:{brushType:'stroke',scale:3,period:4},label:{show:true,position:'right',formatter:'{b}',color:'#94a3b8',fontSize:9,textBorderColor:'rgba(10,14,26,.8)',textBorderWidth:2}}]
    });
    window.addEventListener('resize',()=>mapChart.resize());
}

function init(){
    document.getElementById('updateTime').textContent=updateTime;
    renderChainOverview();renderMetrics();renderPrices();renderNews();renderNodeMonitor();renderInvest();renderCharts();renderWorldMap();
